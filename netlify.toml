[build]
  publish = "."

# No build command needed for static HTML

# Headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
